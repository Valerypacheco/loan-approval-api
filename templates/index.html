<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Loan Approval Predictor</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: #fff;
    padding: 35px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* INPUT GROUP */
.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    font-weight: 600;
    color: #555;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus {
    border-color: #2a5298;
    box-shadow: 0 0 8px rgba(42,82,152,0.3);
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2a5298, #1e3c72);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* RESULT */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    display: none;
    animation: fadeIn 0.4s ease;
}

.approved {
    background: #e6ffed;
    color: #1b5e20;
}

.rejected {
    background: #ffe6e6;
    color: #b71c1c;
}

/* LOADING */
.loading {
    color: #333;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="container">
    <h2>Loan Approval</h2>

    <form id="loanForm">

        <div class="input-group">
            <label>Income</label>
            <input type="number" id="Income" required>
        </div>

        <div class="input-group">
            <label>Credit Score</label>
            <input type="number" id="Credit_Score" required>
        </div>

        <div class="input-group">
            <label>Loan Amount</label>
            <input type="number" id="Loan_Amount" required>
        </div>

        <div class="input-group">
            <label>Debt to Income Ratio</label>
            <input type="number" step="0.01" id="DTI_Ratio" required>
        </div>

        <div class="input-group">
            <label>Employment Status</label>
            <select id="Employment_Status" required>
                <option value="">Selecciona...</option>
                <option value="1">Empleado</option>
                <option value="0">Desempleado</option>
            </select>
        </div>

        <button type="submit">Predict Loan</button>
    </form>

    <div id="result" class="result"></div>

</div>

<script>
document.getElementById("loanForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const data = {
        Income: parseFloat(document.getElementById("Income").value),
        Credit_Score: parseInt(document.getElementById("Credit_Score").value),
        Loan_Amount: parseFloat(document.getElementById("Loan_Amount").value),
        DTI_Ratio: parseFloat(document.getElementById("DTI_Ratio").value),
        Employment_Status: parseInt(document.getElementById("Employment_Status").value)
    };

    const resultBox = document.getElementById("result");

    resultBox.style.display = "block";
    resultBox.className = "result loading";
    resultBox.innerHTML = "⏳ Analizando solicitud...";

    try {
        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        resultBox.className = "result";

        if (result["Loan Approval Prediction"] === 1) {
            resultBox.classList.add("approved");
            resultBox.innerHTML = "✅ Loan Approved";
        } else {
            resultBox.classList.add("rejected");
            resultBox.innerHTML = "❌ Loan Rejected";
        }

    } catch (error) {
        resultBox.className = "result rejected";
        resultBox.innerHTML = "⚠️ Error connecting to server";
    }
});
</script>

</body>
</html>
