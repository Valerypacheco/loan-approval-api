<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
</head>
<body>
    <h2>Loan Approval Prediction</h2>

    <form id="loanForm">
        <label>Income:</label>
        <input type="number" id="Income" required><br><br>

        <label>Credit Score:</label>
        <input type="number" id="Credit_Score" required><br><br>

        <label>Loan Amount:</label>
        <input type="number" id="Loan_Amount" required><br><br>

        <label>Debt to Income Ratio:</label>
        <input type="number" step="0.01" id="DTI_Ratio" required><br><br>

        <label>Employment Status (1=Employed, 0=Unemployed):</label>
        <input type="number" id="Employment_Status" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3 id="result"></h3>

    <script>
        document.getElementById("loanForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const data = {
                Income: parseFloat(document.getElementById("Income").value),
                Credit_Score: parseInt(document.getElementById("Credit_Score").value),
                Loan_Amount: parseFloat(document.getElementById("Loan_Amount").value),
                DTI_Ratio: parseFloat(document.getElementById("DTI_Ratio").value),
                Employment_Status: parseInt(document.getElementById("Employment_Status").value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            document.getElementById("result").innerText =
                "Prediction: " + (result["Loan Approval Prediction"] === 1 ? "Approved" : "Rejected");
        });
    </script>

</body>
</html>
